# Render Blueprint — deploys the OpenBridge backend (NestJS + WebSocket) and a
# managed PostgreSQL database. Import this repo at https://dashboard.render.com
# → New → Blueprint, and Render will provision everything below.
databases:
  - name: openbridge-db
    plan: free
    databaseName: openbridge
    user: openbridge

services:
  - type: web
    name: openbridge-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --skip-generate && node dist/main
    healthCheckPath: /api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: openbridge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_VERSION
        value: 20.11.1
